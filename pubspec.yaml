name: btt_genius
description: BTT Genius AI – Singapore BTT Learning Platform for migrant workers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Backend & Auth
  supabase_flutter: ^2.5.3

  # HTTP
  dio: ^5.4.3
  http: ^1.2.1

  # Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  percent_indicator: ^4.2.3
  confetti: ^0.7.0
  fl_chart: ^0.68.0
  flutter_markdown: ^0.6.22
  animated_text_kit: ^4.2.2
  smooth_page_indicator: ^1.1.0
  flutter_staggered_animations: ^1.1.1
  gap: ^3.0.1

  # Utilities
  connectivity_plus: ^6.0.3
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  path_provider: ^2.1.3
  intl: ^0.19.0
  uuid: ^4.4.0
  crypto: ^3.0.3
  logger: ^2.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  freezed_annotation: ^2.4.2
  json_annotation: ^4.9.0
  collection: ^1.18.0

  # Local Notifications
  flutter_local_notifications: ^17.2.2

  # In-App Purchase
  in_app_purchase: ^3.2.0

  # Image
  image_picker: ^1.1.1

  # Charts & Visualization
  syncfusion_flutter_gauges: ^26.2.9

  # Haptics
  vibration: ^2.0.0

  # Biometrics
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0F172A"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"

flutter_native_splash:
  color: "#0F172A"
  color_dark: "#0F172A"
  image: assets/images/splash.png
  android: true
  ios: true
